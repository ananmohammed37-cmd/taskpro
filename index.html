<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskPro — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#070710;--card:#13131f;--border:rgba(255,255,255,0.08);--accent:#7c5cfc;--accent2:#fc5ca0;--green:#2eff9e;--usdt:#26a17b;--text:#eeeef8;--muted:#666680;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(124,92,252,0.1),transparent 50%),radial-gradient(ellipse at 70% 70%,rgba(252,92,160,0.07),transparent 50%);pointer-events:none;}

.auth-box{width:440px;max-width:95%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;position:relative;z-index:1;}
.logo{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tagline{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:32px;}

.tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px;margin-bottom:28px;}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;border-radius:7px;transition:.2s;}
.tab-btn.active{background:var(--accent);color:white;}

.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.form-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:0.95rem;outline:none;transition:.2s;}
.form-input:focus{border-color:var(--accent);background:rgba(124,92,252,0.06);}
.form-input::placeholder{color:var(--muted);}

.role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.role-option{padding:14px;border:2px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;transition:.2s;}
.role-option:hover{border-color:var(--accent);}
.role-option.selected{border-color:var(--accent);background:rgba(124,92,252,0.1);}
.role-icon{font-size:1.5rem;margin-bottom:4px;}
.role-name{font-size:0.85rem;font-weight:700;}
.role-desc{font-size:0.72rem;color:var(--muted);margin-top:2px;}

.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:white;font-family:'Tajawal',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:.2s;margin-top:8px;}
.submit-btn:hover{opacity:0.88;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.error-msg{background:rgba(245,66,66,0.1);border:1px solid rgba(245,66,66,0.3);border-radius:8px;padding:10px 14px;color:#f54242;font-size:0.83rem;margin-bottom:16px;display:none;}
.success-msg{background:rgba(46,255,158,0.1);border:1px solid rgba(46,255,158,0.3);border-radius:8px;padding:10px 14px;color:var(--green);font-size:0.83rem;margin-bottom:16px;display:none;}

.divider{text-align:center;color:var(--muted);font-size:0.78rem;margin:16px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
.divider::before{right:0;} .divider::after{left:0;}

.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="auth-box">
  <div class="logo">TaskPro</div>
  <div class="tagline">اكسب USDT من مهاراتك 💎</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
    <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="example@email.com" />
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" />
    </div>
    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">دخول →</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label class="form-label">اختر دورك</label>
      <div class="role-select">
        <div class="role-option selected" id="roleWorker" onclick="selectRole('worker')">
          <div class="role-icon">👷</div>
          <div class="role-name">عامل</div>
          <div class="role-desc">أكسب USDT من المهام</div>
        </div>
        <div class="role-option" id="roleAdmin" onclick="selectRole('admin')">
          <div class="role-icon">🏢</div>
          <div class="role-name">صاحب عمل</div>
          <div class="role-desc">انشر مهام واحصل على نتائج</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input class="form-input" id="regUsername" type="text" placeholder="اسمك في المنصة" />
    </div>
    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input class="form-input" id="regEmail" type="email" placeholder="example@email.com" />
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input class="form-input" id="regPassword" type="password" placeholder="8 أحرف على الأقل" />
    </div>
    <button class="submit-btn" id="registerBtn" onclick="handleRegister()">إنشاء الحساب 🚀</button>
  </div>
</div>

<script type="module">
import { signIn, signUp, getUser, getSession } from './supabase.js'

// Check if already logged in
getSession().then(session => {
  if (session) redirectByRole()
})

async function redirectByRole() {
  const user = await getUser()
  if (!user) return
  window.location.href = user.role === 'admin' ? 'admin.html' : 'worker.html'
}

let selectedRole = 'worker'

window.selectRole = function(role) {
  selectedRole = role
  document.getElementById('roleWorker').classList.toggle('selected', role === 'worker')
  document.getElementById('roleAdmin').classList.toggle('selected', role === 'admin')
}

window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='login')))
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none'
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none'
  hideMessages()
}

window.handleLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPassword').value
  if (!email || !password) return showError('أدخل البريد وكلمة المرور')
  setLoading('loginBtn', true)
  const { error } = await signIn(email, password)
  setLoading('loginBtn', false)
  if (error) return showError('بيانات غير صحيحة. تحقق من البريد وكلمة المرور.')
  await redirectByRole()
}

window.handleRegister = async function() {
  const username = document.getElementById('regUsername').value.trim()
  const email = document.getElementById('regEmail').value.trim()
  const password = document.getElementById('regPassword').value
  if (!username || !email || !password) return showError('أكمل جميع الحقول')
  if (password.length < 8) return showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل')
  setLoading('registerBtn', true)
  const { error } = await signUp(email, password, username, selectedRole)
  setLoading('registerBtn', false)
  if (error) return showError(error.message.includes('already') ? 'البريد مستخدم مسبقاً' : 'خطأ في إنشاء الحساب')
  showSuccess('تم إنشاء الحساب! تحقق من بريدك لتفعيل الحساب ✅')
}

function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; document.getElementById('successMsg').style.display = 'none' }
function showSuccess(msg) { const el = document.getElementById('successMsg'); el.textContent = msg; el.style.display = 'block'; document.getElementById('errorMsg').style.display = 'none' }
function hideMessages() { document.getElementById('errorMsg').style.display = 'none'; document.getElementById('successMsg').style.display = 'none' }
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId)
  btn.disabled = loading
  btn.innerHTML = loading ? `جاري التحميل <span class="spinner"></span>` : (btnId === 'loginBtn' ? 'دخول →' : 'إنشاء الحساب 🚀')
}
</script>
</body>
</html>
